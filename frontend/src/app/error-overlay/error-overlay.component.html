<div class="error-overlay">
  <div class="error-content">
    <div class="error-icon">⚠️</div>
    <h1 i18n="@@error_service_unavailable">Service Unavailable</h1>
    <p class="error-message">{{ message }}</p>
    <div class="hint">
      <p i18n="@@error_backend_unreachable">The backend service is currently unreachable.</p>
      <p i18n="@@error_recovery_hint">Please try refreshing the page or contact support if the issue persists.</p>
    </div>
    <button class="refresh-btn" (click)="window.location.reload()" i18n="@@btn_refresh_page">Refresh Page</button>
  </div>
</div>
