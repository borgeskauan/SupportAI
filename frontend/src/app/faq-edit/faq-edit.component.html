<main class="edit-shell">
  <aside class="side-nav">
    <div class="brand-block">
      <h2>Editorial Dash</h2>
      <p>Knowledge MVP</p>
    </div>

    <nav aria-label="Primary">
      <a class="active" routerLink="/" i18n="@@nav_faq_drafts">FAQ Drafts</a>
      <a routerLink="/records" i18n="@@nav_support_records">Support Records</a>
      <a href="#" i18n="@@nav_issues">Issues</a>
      <a href="#" i18n="@@nav_archive">Archive</a>
      <a href="#" i18n="@@nav_settings">Settings</a>
    </nav>
  </aside>

  <section class="main-shell">
    <header class="top-strip">
      <a class="back-link" [routerLink]="['/faq-drafts', detailId()]" i18n="@@btn_cancel">Cancel</a>
      <button class="save-btn" type="button" (click)="save()" i18n="@@btn_save_changes">Save Changes</button>
    </header>

    <section class="canvas">
      <h1 i18n="@@page_title_edit_draft">Edit FAQ Draft</h1>

      <div class="field-group">
        <label for="title" i18n="@@label_article_title">Article Title</label>
        <input id="title" type="text" [(ngModel)]="title" />
      </div>

      <div class="field-group">
        <label for="intent" i18n="@@label_intent_summary">Intent Summary</label>
        <input id="intent" type="text" [(ngModel)]="intent" />
      </div>

      <div class="field-group">
        <label for="problem" i18n="@@label_the_problem">The Problem</label>
        <textarea id="problem" rows="4" [(ngModel)]="problemStatement"></textarea>
      </div>

      <div class="field-group">
        <label for="cause" i18n="@@label_root_cause">Root Cause</label>
        <textarea id="cause" rows="5" [(ngModel)]="causeExplanation"></textarea>
      </div>

      <div class="field-group">
        <label for="steps" i18n="@@label_the_fix">The Fix (one step per line)</label>
        <textarea id="steps" rows="6" [(ngModel)]="stepsText"></textarea>
      </div>

      <div class="split-grid">
        <div class="field-group">
          <label for="edgeCases" i18n="@@label_edge_cases">Edge Cases (one per line)</label>
          <textarea id="edgeCases" rows="5" [(ngModel)]="edgeCasesText"></textarea>
        </div>

        <div class="field-group">
          <label for="contact" i18n="@@label_escalation_contact">Escalation Contact</label>
          <textarea id="contact" rows="5" [(ngModel)]="contactSupport"></textarea>
        </div>
      </div>
    </section>
  </section>
</main>
